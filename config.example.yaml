# Copy to ~/.config/gh-hype-scout/config.yaml
limit: 20
since_days: 45
min_stars: 100
min_age_days: 3
max_age_days: 90
sort: hot
score_preset: hot
desc_width: 56
themes: true
watch: false
interval_seconds: 300
# snapshot_path: /home/you/.cache/gh-hype-scout/snapshots.json
presets:
  - cli
  - devtools
queries:
  - "language:go stars:>80 created:>2026-01-01"
